# Two-Tower Retrieval Model Configuration

model:
  name: "two_tower"
  embedding_dim: 64
  user_tower:
    hidden_dims: [256, 128, 64]
    activation: "relu"
    dropout: 0.2
  item_tower:
    hidden_dims: [256, 128, 64]
    activation: "relu"
    dropout: 0.2

training:
  batch_size: 512
  epochs: 5  # Giảm từ 20 → 5 để train nhanh (demo)
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "adamw"
  scheduler:
    type: "cosine"
    warmup_steps: 1000

  # Contrastive learning
  temperature: 0.07
  num_negatives: 4
  negative_sampling: "random"  # or "popular"

data:
  max_sequence_length: 50
  min_interactions: 5
  train_file: "data/processed/train_interactions.parquet"
  val_file: "data/processed/val_interactions.parquet"
  item_features_file: "data/processed/item_features.parquet"

logging:
  log_interval: 100
  save_interval: 1
  output_dir: "models/retrieval/checkpoints"
  tensorboard: false
  wandb: false

seed: 42
