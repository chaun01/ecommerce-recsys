version: '3.8'

services:
  recsys-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: recsys-api
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - LOG_LEVEL=info
    volumes:
      - ../models:/app/models:ro
      - ../retrieval/indices:/app/retrieval/indices:ro
      - ../data/processed:/app/data/processed:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
